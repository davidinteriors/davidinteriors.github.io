<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News — David Byrne</title>
<meta name="description" content="News and updates from David Byrne's studio.">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">David Byrne</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="work.html">Work</a></li>
        <li><a href="prints.html">Prints</a></li>
        <li>
          <a href="about.html">About</a><button class="dropdown-toggle" aria-label="Toggle About menu" aria-expanded="false">&#9662;</button>
          <div class="nav-dropdown">
            <ul class="nav-dropdown-inner">
              <li><a href="news.html" class="active">News</a></li>
              <li><a href="press.html">Press</a></li>
            </ul>
          </div>
        </li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <div class="wrap">
    <section id="news" class="page-header" style="border-top:none;">
      <p class="eyebrow">News</p>
      <h2>News</h2>
      <div class="cv-group">
        <div class="cv-row"><div class="cv-year">2026</div><div class="cv-detail">Website launched — davidinteriors.github.io</div></div>
      </div>
    </section>
  </div>

  <footer>© <span id="year"></span> David Byrne</footer>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

  <script>
    document.querySelectorAll('.dropdown-toggle').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.preventDefault();
        var li = this.closest('li');
        var isOpen = li.classList.toggle('open');
        this.setAttribute('aria-expanded', isOpen);
      });
    });
    document.addEventListener('click', function(e){
      document.querySelectorAll('.nav-links li.open').forEach(function(li){
        if (!li.contains(e.target)) li.classList.remove('open');
      });
    });
  </script>
</body>
</html>

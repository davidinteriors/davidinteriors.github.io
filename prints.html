<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prints — David Byrne</title>
<meta name="description" content="Limited edition prints by David Byrne — digital-native works designed as standalone print artworks.">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">David Byrne</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="work.html">Work</a></li>
        <li><a href="prints.html" class="active">Prints</a></li>
        <li>
          <a href="about.html">About</a><button class="dropdown-toggle" aria-label="Toggle About menu" aria-expanded="false">&#9662;</button>
          <div class="nav-dropdown">
            <ul class="nav-dropdown-inner">
              <li><a href="news.html">News</a></li>
              <li><a href="press.html">Press</a></li>
            </ul>
          </div>
        </li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <div class="wrap">
    <section id="prints" class="page-header" style="border-top:none;">
      <p class="eyebrow">Prints</p>
      <h2>Limited edition prints</h2>
      <figure class="grid-item" style="margin-bottom:24px;max-width:340px;">
        <img class="work-img" src="assets/heaven_and_earth.png" alt="Heaven and Earth, print artwork" style="aspect-ratio:auto;">
        <figcaption>Heaven and Earth</figcaption>
      </figure>
      <div class="dreamers-grid">
        <figure class="grid-item"><img class="work-img" src="assets/bifurcated_cat_1.jpg" alt="Bifurcated Cat 1"><figcaption>Bifurcated Cat 1</figcaption></figure>
        <figure class="grid-item"><img class="work-img" src="assets/bifurcated_cat_2.jpg" alt="Bifurcated Cat 2"><figcaption>Bifurcated Cat 2</figcaption></figure>
      </div>
      <p>Enquiries about print availability, sizing, and editions are welcome by email.</p>
      <div class="contact-links">
        <a href="mailto:davidinteriors@gmail.com">davidinteriors@gmail.com</a>
      </div>
    </section>
  </div>

  <footer>© <span id="year"></span> David Byrne</footer>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

  <script>
    document.querySelectorAll('.dropdown-toggle').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.preventDefault();
        var li = this.closest('li');
        var isOpen = li.classList.toggle('open');
        this.setAttribute('aria-expanded', isOpen);
      });
    });
    document.addEventListener('click', function(e){
      document.querySelectorAll('.nav-links li.open').forEach(function(li){
        if (!li.contains(e.target)) li.classList.remove('open');
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — David Byrne</title>
<meta name="description" content="Contact David Byrne — sculptor, for exhibitions, editions, or press enquiries.">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">David Byrne</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="work.html">Work</a></li>
        <li><a href="prints.html">Prints</a></li>
        <li>
          <a href="about.html">About</a><button class="dropdown-toggle" aria-label="Toggle About menu" aria-expanded="false">&#9662;</button>
          <div class="nav-dropdown">
            <ul class="nav-dropdown-inner">
              <li><a href="news.html">News</a></li>
              <li><a href="press.html">Press</a></li>
            </ul>
          </div>
        </li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </div>
  </nav>

  <div class="wrap">
    <section id="contact" class="page-header" style="border-top:none;">
      <p class="eyebrow">Contact</p>
      <h2>Get in touch</h2>
      <p>For exhibitions, editions, or press enquiries — send a message directly, or email me.</p>
      <div class="contact-links">
        <a href="mailto:davidinteriors@gmail.com">davidinteriors@gmail.com</a>
      </div>

      <form class="contact-form" action="https://formsubmit.co/davidinteriors@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="New message from davidinteriors.github.io">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="true">
        <input type="text" name="_honey" style="display:none">

        <label for="name">Name</label>
        <input type="text" id="name" name="Name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="Email" required>

        <label for="message">Message</label>
        <textarea id="message" name="Message" rows="6" required></textarea>

        <button type="submit">Send message</button>
      </form>
    </section>
  </div>

  <footer>© <span id="year"></span> David Byrne</footer>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

  <script>
    document.querySelectorAll('.dropdown-toggle').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.preventDefault();
        var li = this.closest('li');
        var isOpen = li.classList.toggle('open');
        this.setAttribute('aria-expanded', isOpen);
      });
    });
    document.addEventListener('click', function(e){
      document.querySelectorAll('.nav-links li.open').forEach(function(li){
        if (!li.contains(e.target)) li.classList.remove('open');
      });
    });
  </script>
</body>
</html>
